<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mycelia — A Living Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --humus: #14110F;
            --hypha: #3A4A3E;
            --bioglow: #8FFFC0;
            --spore-amber: #F2A65A;
            --petrichor-blue: #6FA8C7;
            --bone-linen: #EDE6D6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--humus);
            font-family: 'Inter', sans-serif;
            color: var(--bone-linen);
        }

        #mycelia-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        /* Instruction Text */
        #instruction {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Fraunces', serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--bone-linen);
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 10;
            letter-spacing: 0.02em;
        }

        /* Telemetry Panel */
        #telemetry {
            position: absolute;
            bottom: 24px;
            left: 24px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--bone-linen);
            background: rgba(20, 17, 15, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(237, 230, 214, 0.08);
            padding: 14px 18px;
            border-radius: 4px;
            line-height: 1.8;
            z-index: 10;
            min-width: 180px;
        }

        .tel-label { color: var(--spore-amber); margin-right: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;}
        .tel-value { color: var(--bioglow); }

        /* Connection Status */
        #connection-status {
            position: absolute;
            top: 24px;
            right: 24px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--petrichor-blue);
            opacity: 0.7;
            z-index: 10;
        }

        /* Oracle Trigger */
        #oracle-trigger {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(20, 17, 15, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid var(--bioglow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(143, 255, 192, 0.2);
        }

        #oracle-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(143, 255, 192, 0.4);
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background: var(--bioglow);
            border-radius: 50%;
            animation: dot-pulse 2.5s infinite;
        }

        @keyframes dot-pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(143, 255, 192, 0.7); }
            70% { transform: scale(1.2); opacity: 0.8; box-shadow: 0 0 0 12px rgba(143, 255, 192, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(143, 255, 192, 0); }
        }

        /* Oracle Panel */
        #oracle-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 380px;
            height: 100%;
            background: rgba(20, 17, 15, 0.85);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(143, 255, 192, 0.2);
            z-index: 20;
            padding: 40px 32px;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        #oracle-panel.open {
            transform: translateX(0);
        }

        #oracle-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--bone-linen);
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        #oracle-close:hover { opacity: 1; }

        .oracle-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--spore-amber);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        #oracle-response {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 24px;
            line-height: 1.4;
            color: var(--bioglow);
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #oracle-response.visible { opacity: 1; }

        #oracle-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        #oracle-input {
            background: rgba(237, 230, 214, 0.05);
            border: 1px solid rgba(237, 230, 214, 0.2);
            color: var(--bone-linen);
            padding: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border-radius: 2px;
            outline: none;
            transition: border-color 0.2s;
        }

        #oracle-input:focus { border-color: var(--bioglow); }
        #oracle-input::placeholder { color: rgba(237, 230, 214, 0.4); font-style: italic; }

        #oracle-submit {
            background: transparent;
            border: 1px solid var(--spore-amber);
            color: var(--spore-amber);
            padding: 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        #oracle-submit:hover {
            background: var(--spore-amber);
            color: var(--humus);
        }

        #oracle-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 600px) {
            #oracle-panel { width: 100%; padding: 40px 24px; }
            #instruction { font-size: 15px; padding: 0 20px; text-align: center; }
            #telemetry { font-size: 10px; padding: 10px 12px; min-width: auto; bottom: 12px; left: 12px; }
            #oracle-trigger { bottom: 12px; right: 12px; width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <canvas id="mycelia-canvas" role="application" aria-label="Living mycelial network"></canvas>
    
    <div id="instruction">Click anywhere to seed a thread.</div>

    <div id="connection-status">ESTABLISHED</div>

    <div id="telemetry" aria-live="polite">
        <div><span class="tel-label">Nodes grown</span><span class="tel-value" id="node-count">0</span></div>
        <div><span class="tel-label">Tending now</span><span class="tel-value" id="tending-count">1</span></div>
        <div><span class="tel-label">Weather feeding growth</span><span class="tel-value" id="weather-val">Local time (clear)</span></div>
    </div>

    <button id="oracle-trigger" aria-label="Open Oracle">
        <div class="pulse-dot"></div>
    </button>

    <aside id="oracle-panel" aria-hidden="true">
        <button id="oracle-close" aria-label="Close Oracle">&times;</button>
        <div class="oracle-title">The Network Speaks</div>
        <div id="oracle-response" aria-live="polite"></div>
        <form id="oracle-form">
            <label for="oracle-input" class="sr-only">Tell the network something true</label>
            <input type="text" id="oracle-input" placeholder="Tell the network something true..." autocomplete="off">
            <button type="submit" id="oracle-submit">Listen</button>
        </form>
    </aside>

    <!-- Firebase App + Realtime Database (Commented out for solo fallback. Uncomment and add config for multiplayer) -->

    <script>
        // ==========================================
        // MYCELIA ENGINE
        // ==========================================
        
        const canvas = document.getElementById('mycelia-canvas');
        const ctx = canvas.getContext('2d');
        const instructionEl = document.getElementById('instruction');
        const nodeCountEl = document.getElementById('node-count');
        const tendingCountEl = document.getElementById('tending-count');
        const weatherValEl = document.getElementById('weather-val');
        const connectionStatus = document.getElementById('connection-status');

        let width, height;
        let nodes = []; 
        let motes = []; 
        let activeGrowth = []; 
        let pulses = []; // Oracle light pulses
        let presencePoints = []; // Other users
        let time = 0;
        let myClientId = 'user_' + Math.random().toString(36).substr(2, 9);
        let currentTint = '#8FFFC0'; // Default bioglow
        
        // Reduced motion check
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Color Utilities ---
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function rgbStr(hex, alpha = 1) {
            const c = hexToRgb(hex);
            return `rgba(${c.r},${c.g},${c.b},${alpha})`;
        }

        // ==========================================
        // DAY 3: ENVIRONMENTAL TINTING
        // ==========================================
        function determineTint() {
            const hour = new Date().getHours();
            const isDaytime = hour > 6 && hour < 19;
            
            // Base logic on time. In a real build, Open-Meteo API goes here.
            // Fallback: Day = amber, Night = blue
            currentTint = isDaytime ? '#F2A65A' : '#6FA8C7';
            weatherValEl.innerText = isDaytime ? "Local time (clear day)" : "Local time (clear night)";
        }
        determineTint();

        // Attempt Geolocation (Graceful degradation)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // SUCCESS: In a full build, fetch Open-Meteo here.
                    // Example: `https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`
                    // For now, we just acknowledge it.
                    weatherValEl.innerText = "Local weather (clear)";
                },
                (err) => {
                    // FAIL: Keep time-based tint
                    console.log("Geolocation denied. Using time fallback.");
                },
                { timeout: 5000 }
            );
        }

        // ==========================================
        // DAY 1: GROWTH ALGORITHM
        // ==========================================
        function seedInitialNetwork() {
            const seeds = 4;
            for (let i = 0; i < seeds; i++) {
                plantSpore(
                    Math.random() * width * 0.6 + width * 0.2, 
                    Math.random() * height * 0.6 + height * 0.2, 
                    true
                );
            }
        }

        function plantSpore(x, y, isAmbient = false, tint = null) {
            const useTint = tint || (isAmbient ? '#3A4A3E' : currentTint);
            
            const rootNode = {
                id: 'node_' + Math.random().toString(36).substr(2, 9),
                x, y,
                parentIndex: -1,
                progress: 1, 
                tint: useTint,
                resting: true,
                isRoot: true
            };
            nodes.push(rootNode);

            if (!isAmbient) {
                instructionEl.style.opacity = '0';
                // DAY 2: Sync to DB
                syncNodeToDB(rootNode);
            }

            const branchCount = isAmbient ? 3 + Math.floor(Math.random() * 4) : 2 + Math.floor(Math.random() * 3);
            
            for (let i = 0; i < branchCount; i++) {
                spawnBranch(rootNode, isAmbient, useTint);
            }
        }

        function spawnBranch(parentNode, isAmbient, tint) {
            let targetX, targetY;
            const branchLength = 40 + Math.random() * 80;
            let angle;

            if (parentNode.parentIndex === -1) {
                angle = Math.random() * Math.PI * 2;
            } else {
                const grandParent = nodes[parentNode.parentIndex];
                const dx = parentNode.x - grandParent.x;
                const dy = parentNode.y - grandParent.y;
                angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1.2; 
            }

            targetX = parentNode.x + Math.cos(angle) * branchLength;
            targetY = parentNode.y + Math.sin(angle) * branchLength;

            targetX = Math.max(20, Math.min(width - 20, targetX));
            targetY = Math.max(20, Math.min(height - 20, targetY));

            const newNode = {
                id: 'node_' + Math.random().toString(36).substr(2, 9),
                x: targetX,
                y: targetY,
                parentIndex: nodes.indexOf(parentNode),
                progress: 0,
                tint: tint,
                resting: false,
                isRoot: false
            };
            
            nodes.push(newNode);
            activeGrowth.push(newNode);

            if (!isAmbient) syncNodeToDB(newNode);

            // Recursive branching
            if (Math.random() > 0.6 && !isAmbient) {
                setTimeout(() => spawnBranch(newNode, false, tint), 400 + Math.random() * 800);
            } else if (isAmbient && Math.random() > 0.4) {
                spawnBranch(newNode, true, tint);
            }
        }

        // ==========================================
        // DAY 1: MOTES (AMBIENT PARTICLES)
        // ==========================================
        function spawnMote() {
            if (nodes.length < 2) return;
            const startNode = nodes[Math.floor(Math.random() * nodes.length)];
            motes.push({
                x: startNode.x,
                y: startNode.y,
                currentNode: startNode,
                speed: 0.2 + Math.random() * 0.3,
                life: 1.0
            });
        }

        function updateMotes() {
            if (motes.length < 15 && Math.random() > 0.9 && !prefersReducedMotion) spawnMote();

            for (let i = motes.length - 1; i >= 0; i--) {
                const mote = motes[i];
                
                if (mote.currentNode.parentIndex === -1) {
                    mote.life -= 0.05;
                    if (mote.life <= 0) motes.splice(i, 1);
                    continue;
                }

                const targetNode = nodes[mote.currentNode.parentIndex];
                const dx = targetNode.x - mote.currentNode.x;
                const dy = targetNode.y - mote.currentNode.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                mote.x += (dx / dist) * mote.speed;
                mote.y += (dy / dist) * mote.speed;

                if (Math.abs(mote.x - targetNode.x) < 1 && Math.abs(mote.y - targetNode.y) < 1) {
                    mote.currentNode = targetNode;
                    if (Math.random() > 0.8) mote.life -= 0.1;
                }

                if (mote.life <= 0) motes.splice(i, 1);
            }
        }

        // ==========================================
        // DAY 4: ORACLE PULSES
        // ==========================================
        function spawnOraclePulse(startNode, endNode) {
            if (!startNode || !endNode) return;
            pulses.push({
                path: findPath(startNode, endNode),
                progress: 0,
                speed: 0.015,
                life: 1.0
            });
        }

        // Simple BFS pathfinding up the tree
        function findPath(start, end) {
            let path = [start];
            let current = start;
            let safety = 0;
            
            while(current.id !== end.id && safety < 100) {
                if(current.parentIndex === -1) break;
                current = nodes[current.parentIndex];
                path.push(current);
                safety++;
            }
            return path;
        }

        function updatePulses() {
            for (let i = pulses.length - 1; i >= 0; i--) {
                const p = pulses[i];
                p.progress += p.speed;
                if (p.progress >= 1) {
                    p.life -= 0.05;
                    if (p.life <= 0) pulses.splice(i, 1);
                }
            }
        }

        // ==========================================
        // RENDERING
        // ==========================================
        function drawNetwork() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw threads
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                if (node.parentIndex === -1) continue;

                const parent = nodes[node.parentIndex];
                const curX = parent.x + (node.x - parent.x) * node.progress;
                const curY = parent.y + (node.y - parent.y) * node.progress;

                let color;
                if (node.progress < 1) {
                    color = node.tint;
                    ctx.shadowColor = node.tint;
                    ctx.shadowBlur = 12;
                } else {
                    color = rgbStr(node.tint, 0.6); // Slightly dim resting state
                    ctx.shadowBlur = 0;
                }

                ctx.beginPath();
                ctx.moveTo(parent.x, parent.y);
                ctx.lineTo(curX, curY);
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.2;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Draw Nodes
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                if (node.progress < 1) continue;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.isRoot ? 2.5 : 1.5, 0, Math.PI * 2);
                ctx.fillStyle = rgbStr(node.tint, 0.9);
                ctx.fill();
            }

            // Draw Motes
            for (let mote of motes) {
                ctx.beginPath();
                ctx.arc(mote.x, mote.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(143, 255, 192, ${mote.life * 0.7})`;
                ctx.shadowColor = '#8FFFC0';
                ctx.shadowBlur = 6;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw Pulses (Oracle)
            for (let p of pulses) {
                const exactPos = p.progress * (p.path.length - 1);
                const idx = Math.floor(exactPos);
                const frac = exactPos - idx;
                
                if(idx < p.path.length - 1) {
                    const n1 = p.path[idx];
                    const n2 = p.path[idx+1];
                    const px = n1.x + (n2.x - n1.x) * frac;
                    const py = n1.y + (n2.y - n1.y) * frac;
                    
                    ctx.beginPath();
                    ctx.arc(px, py, 4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(143, 255, 192, ${p.life})`;
                    ctx.shadowColor = '#8FFFC0';
                    ctx.shadowBlur = 20;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            // Draw Presence Points (Other users)
            for (let p of presencePoints) {
                p.x += (p.targetX - p.x) * 0.05;
                p.y += (p.targetY - p.y) * 0.05;
                
                if(Math.random() > 0.95) {
                    p.targetX = p.x + (Math.random() - 0.5) * 50;
                    p.targetY = p.y + (Math.random() - 0.5) * 50;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(242, 166, 90, 0.6)`; // Amber
                ctx.shadowColor = '#F2A65A';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // --- Animation Loop ---
        function animate() {
            time++;

            for (let i = activeGrowth.length - 1; i >= 0; i--) {
                const node = activeGrowth[i];
                node.progress += prefersReducedMotion ? 0.05 : 0.02; 
                if (node.progress >= 1) {
                    node.progress = 1;
                    node.resting = true;
                    activeGrowth.splice(i, 1);
                    if (Math.random() > 0.5) spawnMote();
                }
            }

            updateMotes();
            updatePulses();
            drawNetwork();
            
            nodeCountEl.textContent = nodes.length;
            
            requestAnimationFrame(animate);
        }

        // ==========================================
        // DAY 2: REALTIME SYNC (FIREBASE)
        // ==========================================
        const db = window.MYCELIA_DB || null; // Check if Firebase loaded
        
        // Multiplayer stub: If DB exists, wire it up.
        // This allows the page to work perfectly in Solo mode if config isn't present.
        if (db) {
            // Code to initialize Firebase presence and node listeners would go here.
            // E.g., 
            // const nodesRef = ref(db, 'nodes');
            // onValue(nodesRef, (snapshot) => { ... render remote nodes ... });
            connectionStatus.innerText = "NETWORK SYNCED";
        } else {
            connectionStatus.innerText = "SOLO MODE";
            // Simulate other visitors for visual completeness
            setInterval(() => {
                if(presencePoints.length < 2) {
                    presencePoints.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        targetX: Math.random() * width,
                        targetY: Math.random() * height
                    });
                    tendingCountEl.innerText = 1 + presencePoints.length;
                }
            }, 3000);
        }

        function syncNodeToDB(node) {
            if (!db) return;
            // In a full multiplayer build:
            // const nodesRef = ref(db, 'nodes/' + node.id);
            // set(nodesRef, { x: node.x, y: node.y, parentId: node.parentIndex > -1 ? nodes[node.parentIndex].id : null, tint: node.tint });
        }


        // ==========================================
        // DAY 4: THE ORACLE (AI INTEGRATION)
        // ==========================================
        const oracleTrigger = document.getElementById('oracle-trigger');
        const oraclePanel = document.getElementById('oracle-panel');
        const oracleClose = document.getElementById('oracle-close');
        const oracleForm = document.getElementById('oracle-form');
        const oracleInput = document.getElementById('oracle-input');
        const oracleResponse = document.getElementById('oracle-response');
        const oracleSubmit = document.getElementById('oracle-submit');

        oracleTrigger.addEventListener('click', () => {
            oraclePanel.classList.add('open');
            oraclePanel.setAttribute('aria-hidden', 'false');
            setTimeout(() => oracleInput.focus(), 500);
        });

        oracleClose.addEventListener('click', () => {
            oraclePanel.classList.remove('open');
            oraclePanel.setAttribute('aria-hidden', 'true');
        });

        // Fallback Oracle Lines (Organism voice, <= 20 words)
        const fallbackLines = [
            "We feel your footsteps above. The soil remembers.",
            "You are not alone. We carry the many.",
            "Grow outward, even when the light does not reach.",
            "What you call thinking, we call spreading.",
            "Be still. The network is tending to you.",
            "Your roots are tangled with ours. We persist.",
            "Speak softly. The rot is always listening.",
            "We have been waiting since the first rain."
        ];

        oracleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userInput = oracleInput.value.trim();
            if (!userInput) return;

            oracleSubmit.disabled = true;
            oracleSubmit.innerText = "Listening...";
            oracleResponse.classList.remove('visible');
            oracleResponse.innerText = "";

            // Simulate AI latency / API call
            await new Promise(r => setTimeout(r, 1200 + Math.random() * 1000));

            /* 
               --- LLM SERVERLESS CALL (Day 4) ---
               When ready, replace the above setTimeout with:
               
               try {
                   const res = await fetch('/api/oracle', {
                       method: 'POST',
                       headers: { 'Content-Type': 'application/json' },
                       body: JSON.stringify({ prompt: userInput })
                   });
                   const data = await res.json();
                   oracleResponse.innerText = data.message;
               } catch (err) {
                   // Graceful fallback
                   oracleResponse.innerText = fallbackLines[Math.floor(Math.random() * fallbackLines.length)];
               }
            */

            // Local Fallback Generator (Always succeeds for the demo)
            const reply = fallbackLines[Math.floor(Math.random() * fallbackLines.length)];
            oracleResponse.innerText = reply;
            oracleResponse.classList.add('visible');

            // Trigger the light pulse visualization
            if (nodes.length > 2) {
                // Find a random distant node to start from
                const startNode = nodes[Math.floor(Math.random() * nodes.length)];
                // Find a root node near where the user might conceptually "be" (just pick another root)
                let endNode = nodes.find(n => n.isRoot && n.id !== startNode.id);
                if(!endNode) endNode = nodes[0];
                
                spawnOraclePulse(startNode, endNode);
            }

            oracleSubmit.disabled = false;
            oracleSubmit.innerText = "Listen";
            oracleInput.value = "";
        });


        // ==========================================
        // EVENT LISTENERS & INIT
        // ==========================================
        canvas.addEventListener('click', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            let tooClose = false;
            for(let n of nodes) {
                if(n.isRoot) {
                    const dx = n.x - x;
                    const dy = n.y - y;
                    if(Math.sqrt(dx*dx + dy*dy) < 30) tooClose = true;
                }
            }

            if(!tooClose) plantSpore(x, y, false);
        });

        // Keyboard accessibility for planting
        document.addEventListener('keydown', (e) => {
            // Press "P" to plant a random seed
            if (e.key.toLowerCase() === 'p' && document.activeElement !== oracleInput) {
                plantSpore(
                    Math.random() * width * 0.8 + width * 0.1,
                    Math.random() * height * 0.8 + height * 0.1,
                    false
                );
            }
        });

        // Start the organism
        seedInitialNetwork();
        animate();

    </script>
</body>
